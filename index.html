<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mindwave</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0e14;
      --surface:   #111722;
      --border:    #1e2a3a;
      --muted:     #3a4a5e;
      --text:      #c8d8e8;
      --text-dim:  #5a7080;
      --accent:    #4fc3f7;
      --glow:      rgba(79, 195, 247, 0.15);
      --warn:      #f0a070;
      --c-focus:   #4fc3f7;
      --c-flow:    #81c784;
      --c-relax:   #ce93d8;
      --c-sleep:   #5c6bc0;
      --c-meditate:#ffb74d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 2rem;
      overflow-x: hidden;
    }

    /* --- Header --- */
    header {
      width: 100%;
      max-width: 480px;
      padding: 1.75rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      position: relative;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .tagline {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .version-badge {
      position: absolute;
      top: 1.75rem;
      right: 0;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* --- Warning badge --- */
    .headphone-note {
      margin-top: 0.75rem;
      width: 100%;
      max-width: 480px;
      background: rgba(240, 160, 112, 0.08);
      border: 1px solid rgba(240, 160, 112, 0.25);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.68rem;
      color: var(--warn);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* --- Mode selector --- */
    .modes {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 480px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
    }

    .mode-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 0.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn:hover { border-color: var(--muted); }

    .mode-icon  { font-size: 1.3rem; }
    .mode-label { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
    .mode-hz    { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.05em; }

    .mode-btn.active[data-mode="focus"]    { border-color: var(--c-focus);    background: rgba(79,195,247,0.08); }
    .mode-btn.active[data-mode="flow"]     { border-color: var(--c-flow);     background: rgba(129,199,132,0.08); }
    .mode-btn.active[data-mode="relax"]    { border-color: var(--c-relax);    background: rgba(206,147,216,0.08); }
    .mode-btn.active[data-mode="sleep"]    { border-color: var(--c-sleep);    background: rgba(92,107,192,0.08); }
    .mode-btn.active[data-mode="meditate"] { border-color: var(--c-meditate); background: rgba(255,183,77,0.08); }

    .mode-btn.active .mode-label { color: var(--text); }
    .mode-btn.active[data-mode="focus"]    .mode-label { color: var(--c-focus); }
    .mode-btn.active[data-mode="flow"]     .mode-label { color: var(--c-flow); }
    .mode-btn.active[data-mode="relax"]    .mode-label { color: var(--c-relax); }
    .mode-btn.active[data-mode="sleep"]    .mode-label { color: var(--c-sleep); }
    .mode-btn.active[data-mode="meditate"] .mode-label { color: var(--c-meditate); }

    /* --- Orb --- */
    .orb-wrap {
      margin-top: 1.75rem;
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      transition: border-color 0.6s ease;
    }

    .orb-ring.pulse { animation: ringPulse 3s ease-in-out infinite; }

    .orb-ring-outer {
      inset: -16px;
      border-color: transparent;
    }

    .orb-ring-outer.pulse { animation: outerPulse 3s ease-in-out infinite 0.4s; }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 0.8; transform: scale(1.02); }
    }

    @keyframes outerPulse {
      0%, 100% { opacity: 0; transform: scale(1); }
      50%       { opacity: 0.25; transform: scale(1.04); }
    }

    .orb {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 36%,
        rgba(255,255,255,0.06) 0%,
        var(--surface) 60%,
        var(--bg) 100%);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      -webkit-tap-highlight-color: transparent;
      gap: 0.2rem;
      overflow: hidden;
    }

    .orb:hover { transform: scale(1.03); }

    .orb-play-icon {
      font-size: 1.6rem;
      transition: opacity 0.3s;
      position: relative;
      z-index: 2;
    }

    .orb-status {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      position: relative;
      z-index: 2;
    }

    /* Waveform canvas inside orb */
    #waveCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.8s ease;
      z-index: 1;
    }

    body.playing #waveCanvas { opacity: 1; }

    body.playing .orb {
      box-shadow: 0 0 60px var(--glow), 0 0 20px var(--glow);
    }

    body.playing .orb-ring { border-color: var(--accent); }

    /* --- Timer --- */
    .timer-section {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 480px;
    }

    .timer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .timer-label {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .timer-presets {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .preset-btn:hover, .preset-btn.active {
      border-color: var(--accent);
      color: var(--text);
    }

    .timer-display {
      margin-top: 0.75rem;
      text-align: center;
    }

    .timer-digits {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1;
      transition: color 0.4s;
    }

    .timer-digits.counting { color: var(--accent); }

    .timer-bar-wrap {
      margin-top: 0.5rem;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 1s linear, background 0.5s;
    }

    /* --- Mix controls --- */
    .mix-section {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 480px;
    }

    .section-label {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }

    .mix-controls { display: flex; flex-direction: column; gap: 0.75rem; }

    .mix-row { display: flex; align-items: center; gap: 0.75rem; }

    .mix-row-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      width: 60px;
      flex-shrink: 0;
    }

    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .mix-val { font-size: 0.62rem; color: var(--text-dim); width: 28px; text-align: right; }

    .noise-types { display: flex; gap: 0.4rem; }

    .noise-type-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    .noise-type-btn.active { border-color: var(--accent); color: var(--text); }

    /* --- Mode info --- */
    .mode-info {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.65rem;
      line-height: 1.7;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .mode-info strong { color: var(--text); font-weight: 400; }

    /* --- Sleep volume ramp indicator --- */
    .sleep-ramp-note {
      display: none;
      margin-top: 0.5rem;
      width: 100%;
      max-width: 480px;
      font-size: 0.6rem;
      color: var(--c-sleep);
      letter-spacing: 0.08em;
      text-align: center;
      opacity: 0.7;
    }

    body.mode-sleep.playing .sleep-ramp-note { display: block; }

    /* --- Footer --- */
    .footer {
      margin-top: 1.75rem;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
    }

    @media (max-width: 360px) {
      .modes { gap: 0.3rem; }
      .mode-btn { padding: 0.6rem 0.15rem; }
      .mode-icon { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Mindwave</div>
  <div class="tagline">Generative neural audio</div>
  <div class="version-badge">v1.2</div>
</header>

<div class="headphone-note">
  ⚠ Headphones required — binaural beats rely on independent per-ear frequencies
</div>

<div class="modes">
  <button class="mode-btn active" data-mode="focus">
    <span class="mode-icon">⚡</span>
    <span class="mode-label">Focus</span>
    <span class="mode-hz">16 Hz</span>
  </button>
  <button class="mode-btn" data-mode="flow">
    <span class="mode-icon">🌊</span>
    <span class="mode-label">Flow</span>
    <span class="mode-hz">10 Hz</span>
  </button>
  <button class="mode-btn" data-mode="relax">
    <span class="mode-icon">🍃</span>
    <span class="mode-label">Relax</span>
    <span class="mode-hz">7 Hz</span>
  </button>
  <button class="mode-btn" data-mode="sleep">
    <span class="mode-icon">🌙</span>
    <span class="mode-label">Sleep</span>
    <span class="mode-hz">2 Hz</span>
  </button>
  <button class="mode-btn" data-mode="meditate">
    <span class="mode-icon">◎</span>
    <span class="mode-label">Meditate</span>
    <span class="mode-hz">5 Hz</span>
  </button>
</div>

<div class="orb-wrap">
  <div class="orb-ring orb-ring-outer" id="orbRingOuter"></div>
  <div class="orb-ring" id="orbRing"></div>
  <div class="orb" id="orbBtn">
    <canvas id="waveCanvas"></canvas>
    <span class="orb-play-icon" id="orbIcon">▶</span>
    <span class="orb-status" id="orbStatus">tap to begin</span>
  </div>
</div>

<div class="timer-section">
  <div class="timer-row">
    <span class="timer-label">Session</span>
    <div class="timer-presets">
      <button class="preset-btn" data-min="15">15m</button>
      <button class="preset-btn active" data-min="30">30m</button>
      <button class="preset-btn" data-min="45">45m</button>
      <button class="preset-btn" data-min="60">60m</button>
      <button class="preset-btn" data-min="0">∞</button>
    </div>
  </div>
  <div class="timer-display">
    <div class="timer-digits" id="timerDigits">30:00</div>
  </div>
  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timerBar"></div>
  </div>
</div>

<div class="mix-section">
  <div class="section-label">Mix</div>
  <div class="mix-controls">
    <div class="mix-row">
      <span class="mix-row-label">Tone</span>
      <input type="range" id="toneVol" min="0" max="100" value="45">
      <span class="mix-val" id="toneVolVal">45</span>
    </div>
    <div class="mix-row">
      <span class="mix-row-label">Noise</span>
      <input type="range" id="noiseVol" min="0" max="100" value="55">
      <span class="mix-val" id="noiseVolVal">55</span>
    </div>
    <div class="mix-row">
      <span class="mix-row-label">Type</span>
      <div class="noise-types">
        <button class="noise-type-btn" data-noise="pink">Pink</button>
        <button class="noise-type-btn active" data-noise="brown">Brown</button>
        <button class="noise-type-btn" data-noise="white">White</button>
      </div>
    </div>
    <div class="mix-row">
      <span class="mix-row-label">Carrier</span>
      <input type="range" id="carrierFreq" min="80" max="300" value="200">
      <span class="mix-val" id="carrierFreqVal">200</span>
    </div>
  </div>
</div>

<div class="mode-info" id="modeInfo"></div>
<div class="sleep-ramp-note">Volume will fade gradually over your session</div>

<div class="footer">No network required · All audio generated locally</div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS & STATE
// ─────────────────────────────────────────────
const VERSION = '1.2';

const MODES = {
  focus:    { beat: 16, label: 'Beta / Focus',         hz: '16 Hz', desc: 'promotes alertness and active concentration. Best for analytical tasks, writing, and detail work.',          defaultCarrier: 220 },
  flow:     { beat: 10, label: 'Alpha / Flow',          hz: '10 Hz', desc: 'relaxed alertness, light creative focus. Good for brainstorming, reading, and moderate-intensity work.',    defaultCarrier: 200 },
  relax:    { beat: 7,  label: 'Alpha-Theta / Relax',   hz: '7 Hz',  desc: 'the boundary between relaxed waking and light trance. Good for unwinding and gentle reflection.',          defaultCarrier: 180 },
  sleep:    { beat: 2,  label: 'Delta / Sleep',         hz: '2 Hz',  desc: 'deep sleep and restoration range. Volume fades gradually over your session. Use to wind down before bed.',  defaultCarrier: 120 },
  meditate: { beat: 5,  label: 'Theta / Meditate',      hz: '5 Hz',  desc: 'deep meditation and light dream state. Supports inward focus, visualization, and contemplation.',          defaultCarrier: 160 },
};

// Per-mode carrier memory (persisted across mode switches)
const carrierMemory = {
  focus: 220, flow: 200, relax: 180, sleep: 120, meditate: 160
};

let audioCtx     = null;
let isPlaying    = false;
let currentMode  = 'focus';
let noiseType    = 'brown';
let sessionMinutes = 30;
let timerInterval  = null;
let timerRemaining = 0;
let timerTotal     = 0;

// Audio nodes
let toneGainL = null, toneGainR = null, noiseGain = null;
let masterGain = null, fadeGain = null;
let oscL = null, oscR = null, noiseNode = null;

// Sleep volume ramp
let sleepRampInterval = null;

// Waveform animation
let waveAnimId = null;
let analyser   = null;

// ─────────────────────────────────────────────
//  AUDIO CONTEXT
// ─────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// ─────────────────────────────────────────────
//  NOISE BUFFERS
// ─────────────────────────────────────────────
function makeBrownNoiseBuffer(ctx) {
  const len = ctx.sampleRate * 4;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    const w = Math.random() * 2 - 1;
    d[i] = (last + 0.02 * w) / 1.02;
    last = d[i];
    d[i] *= 3.5;
  }
  return buf;
}

function makePinkNoiseBuffer(ctx) {
  const len = ctx.sampleRate * 4;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < len; i++) {
    const w = Math.random() * 2 - 1;
    b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
    b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
    b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
    d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
    b6 = w * 0.115926;
  }
  return buf;
}

function makeWhiteNoiseBuffer(ctx) {
  const len = ctx.sampleRate * 4;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  return buf;
}

function getNoiseBuffer(ctx) {
  if (noiseType === 'pink')  return makePinkNoiseBuffer(ctx);
  if (noiseType === 'white') return makeWhiteNoiseBuffer(ctx);
  return makeBrownNoiseBuffer(ctx);
}

// ─────────────────────────────────────────────
//  AUDIO START / STOP
// ─────────────────────────────────────────────
function getToneGain()  { return parseInt(document.getElementById('toneVol').value)  / 100 * 0.3; }
function getNoiseGain() { return parseInt(document.getElementById('noiseVol').value) / 100 * 0.5; }

function startAudio() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  // Master chain: fadeGain → masterGain → destination
  masterGain = ctx.createGain();
  masterGain.gain.value = 1.0;

  fadeGain = ctx.createGain();
  fadeGain.gain.value = 0; // start silent, ramp up
  fadeGain.connect(masterGain);
  masterGain.connect(ctx.destination);

  // Analyser for waveform
  analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  masterGain.connect(analyser);

  // Binaural tones
  const carrier = carrierMemory[currentMode];
  const beat    = MODES[currentMode].beat;

  const merger = ctx.createChannelMerger(2);
  merger.connect(fadeGain);

  oscL = ctx.createOscillator();
  oscL.type = 'sine';
  oscL.frequency.value = carrier;
  toneGainL = ctx.createGain();
  toneGainL.gain.value = getToneGain();
  oscL.connect(toneGainL);
  toneGainL.connect(merger, 0, 0);
  oscL.start();

  oscR = ctx.createOscillator();
  oscR.type = 'sine';
  oscR.frequency.value = carrier + beat;
  toneGainR = ctx.createGain();
  toneGainR.gain.value = getToneGain();
  oscR.connect(toneGainR);
  toneGainR.connect(merger, 0, 1);
  oscR.start();

  // Noise
  const noiseBuf  = getNoiseBuffer(ctx);
  noiseNode = ctx.createBufferSource();
  noiseNode.buffer = noiseBuf;
  noiseNode.loop = true;
  noiseGain = ctx.createGain();
  noiseGain.gain.value = getNoiseGain();
  const noiseMerger = ctx.createChannelMerger(2);
  noiseNode.connect(noiseGain);
  noiseGain.connect(noiseMerger, 0, 0);
  noiseGain.connect(noiseMerger, 0, 1);
  noiseMerger.connect(fadeGain);
  noiseNode.start();

  // Fade in over 2.5s
  fadeGain.gain.setValueAtTime(0, ctx.currentTime);
  fadeGain.gain.linearRampToValueAtTime(1.0, ctx.currentTime + 2.5);

  // Start sleep volume ramp if in sleep mode
  startSleepRampIfNeeded();

  // Start waveform animation
  startWaveform();
}

function stopAudio(instant = false) {
  stopSleepRamp();
  stopWaveform();

  const doStop = () => {
    if (oscL)     { try { oscL.stop(); }      catch(e){} oscL = null; }
    if (oscR)     { try { oscR.stop(); }      catch(e){} oscR = null; }
    if (noiseNode){ try { noiseNode.stop(); } catch(e){} noiseNode = null; }
    toneGainL = null; toneGainR = null; noiseGain = null;
    masterGain = null; fadeGain = null; analyser = null;
  };

  if (instant || !fadeGain || !audioCtx) {
    doStop();
  } else {
    // Fade out over 2s then stop
    const ctx = audioCtx;
    fadeGain.gain.cancelScheduledValues(ctx.currentTime);
    fadeGain.gain.setValueAtTime(fadeGain.gain.value, ctx.currentTime);
    fadeGain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 2.0);
    setTimeout(doStop, 2200);
  }
}

function updateToneGain() {
  const g = getToneGain();
  if (toneGainL) toneGainL.gain.value = g;
  if (toneGainR) toneGainR.gain.value = g;
}

function updateNoiseGain() {
  if (noiseGain) noiseGain.gain.value = getNoiseGain();
}

// ─────────────────────────────────────────────
//  SLEEP VOLUME RAMP
// ─────────────────────────────────────────────
function startSleepRampIfNeeded() {
  stopSleepRamp();
  if (currentMode !== 'sleep' || sessionMinutes === 0) return;

  // Ramp master volume from 1.0 down to 0.15 over the session
  const totalMs   = sessionMinutes * 60 * 1000;
  const stepMs    = 5000; // every 5 seconds
  const steps     = totalMs / stepMs;
  const startGain = 1.0;
  const endGain   = 0.15;
  let   step      = 0;

  sleepRampInterval = setInterval(() => {
    if (!masterGain || !isPlaying) { stopSleepRamp(); return; }
    step++;
    const t = Math.min(step / steps, 1);
    masterGain.gain.value = startGain + (endGain - startGain) * t;
  }, stepMs);
}

function stopSleepRamp() {
  if (sleepRampInterval) { clearInterval(sleepRampInterval); sleepRampInterval = null; }
  if (masterGain) masterGain.gain.value = 1.0;
}

// ─────────────────────────────────────────────
//  BOWL CUE
// ─────────────────────────────────────────────
function playBowlCue() {
  const ctx = getAudioCtx();
  const g = ctx.createGain();
  g.connect(ctx.destination);

  const osc  = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 432;
  osc.connect(g);

  const g2   = ctx.createGain();
  g2.gain.value = 0.3;
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 864;
  osc2.connect(g2);
  g2.connect(g);

  const now = ctx.currentTime;
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.4, now + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, now + 4.0);

  osc.start(now);  osc.stop(now + 4.5);
  osc2.start(now); osc2.stop(now + 4.5);
}

// ─────────────────────────────────────────────
//  WAVEFORM ANIMATION
// ─────────────────────────────────────────────
function startWaveform() {
  const canvas = document.getElementById('waveCanvas');
  const ctx2   = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();

  const accentColor = getComputedStyle(document.documentElement)
    .getPropertyValue('--accent').trim();

  function draw() {
    if (!analyser) return;
    waveAnimId = requestAnimationFrame(draw);

    const w = canvas.width, h = canvas.height;
    const bufLen = analyser.frequencyBinCount;
    const data   = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(data);

    ctx2.clearRect(0, 0, w, h);

    // Circular clip
    ctx2.save();
    ctx2.beginPath();
    ctx2.arc(w/2, h/2, Math.min(w,h)/2, 0, Math.PI*2);
    ctx2.clip();

    ctx2.lineWidth   = 1.5;
    ctx2.strokeStyle = accentColor || '#4fc3f7';
    ctx2.globalAlpha = 0.35;
    ctx2.beginPath();

    const sliceW = w / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = data[i] / 128.0;
      const y = (v * h) / 2;
      if (i === 0) ctx2.moveTo(x, y);
      else         ctx2.lineTo(x, y);
      x += sliceW;
    }
    ctx2.lineTo(w, h/2);
    ctx2.stroke();
    ctx2.restore();
  }

  draw();
}

function stopWaveform() {
  if (waveAnimId) { cancelAnimationFrame(waveAnimId); waveAnimId = null; }
  const canvas = document.getElementById('waveCanvas');
  if (canvas) {
    const ctx2 = canvas.getContext('2d');
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
  }
}

// ─────────────────────────────────────────────
//  TIMER
// ─────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  if (sessionMinutes === 0) {
    timerRemaining = Infinity;
    updateTimerDisplay();
    return;
  }
  timerTotal     = sessionMinutes * 60;
  timerRemaining = timerTotal;
  updateTimerDisplay();

  timerInterval = setInterval(() => {
    if (!isPlaying) { clearInterval(timerInterval); return; }
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      playBowlCue();
      setTimeout(() => { if (isPlaying) togglePlay(); }, 4500);
    }
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function updateTimerDisplay() {
  const el  = document.getElementById('timerDigits');
  const bar = document.getElementById('timerBar');

  if (!isFinite(timerRemaining) || sessionMinutes === 0) {
    el.textContent = '∞';
    bar.style.width = '0%';
    el.classList.remove('counting');
    return;
  }

  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  if (isPlaying && timerTotal > 0) {
    el.classList.add('counting');
    bar.style.width = ((timerTotal - timerRemaining) / timerTotal * 100) + '%';
  } else {
    el.classList.remove('counting');
    bar.style.width = '0%';
  }
}

// ─────────────────────────────────────────────
//  TOGGLE PLAY
// ─────────────────────────────────────────────
function togglePlay() {
  if (isPlaying) {
    isPlaying = false;
    stopAudio();        // fades out
    stopTimer();
    document.body.classList.remove('playing', 'mode-' + currentMode);
    document.getElementById('orbIcon').textContent   = '▶';
    document.getElementById('orbStatus').textContent = 'tap to begin';
    document.getElementById('orbRing').classList.remove('pulse');
    document.getElementById('orbRingOuter').classList.remove('pulse');
    updateTimerDisplay();
  } else {
    isPlaying = true;
    startAudio();
    startTimer();
    document.body.classList.add('playing', 'mode-' + currentMode);
    document.getElementById('orbIcon').textContent   = '■';
    document.getElementById('orbStatus').textContent = MODES[currentMode].hz;
    document.getElementById('orbRing').classList.add('pulse');
    document.getElementById('orbRingOuter').classList.add('pulse');
    applyModeColor();
  }
}

// ─────────────────────────────────────────────
//  MODE COLOR
// ─────────────────────────────────────────────
function applyModeColor() {
  const colors = {
    focus: 'var(--c-focus)', flow: 'var(--c-flow)', relax: 'var(--c-relax)',
    sleep: 'var(--c-sleep)', meditate: 'var(--c-meditate)'
  };
  const glows = {
    focus:    'rgba(79,195,247,0.18)',
    flow:     'rgba(129,199,132,0.18)',
    relax:    'rgba(206,147,216,0.18)',
    sleep:    'rgba(92,107,192,0.18)',
    meditate: 'rgba(255,183,77,0.18)',
  };
  document.documentElement.style.setProperty('--accent', colors[currentMode]);
  document.documentElement.style.setProperty('--glow',   glows[currentMode]);
}

// ─────────────────────────────────────────────
//  MODE INFO
// ─────────────────────────────────────────────
function updateModeInfo() {
  const m = MODES[currentMode];
  document.getElementById('modeInfo').innerHTML =
    `<strong>${m.label} (${m.hz})</strong> — ${m.desc}`;
}

// ─────────────────────────────────────────────
//  CARRIER SLIDER — sync to current mode memory
// ─────────────────────────────────────────────
function syncCarrierSlider() {
  const val = carrierMemory[currentMode];
  document.getElementById('carrierFreq').value = val;
  document.getElementById('carrierFreqVal').textContent = val;
}

// ─────────────────────────────────────────────
//  WAKE LOCK
// ─────────────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); }
  catch(e) { console.warn('Wake lock denied:', e); }
}

async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch(e){} wakeLock = null; }
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && isPlaying) {
    await requestWakeLock();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
});

// ─────────────────────────────────────────────
//  UI EVENTS
// ─────────────────────────────────────────────

// Orb — single listener
document.getElementById('orbBtn').addEventListener('click', async () => {
  togglePlay();
  if (isPlaying) await requestWakeLock();
  else           await releaseWakeLock();
});

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    // Save current carrier before switching
    carrierMemory[currentMode] = parseInt(document.getElementById('carrierFreq').value);

    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Update body class for sleep ramp note
    document.body.classList.remove('mode-' + currentMode);
    currentMode = btn.dataset.mode;
    if (isPlaying) document.body.classList.add('mode-' + currentMode);

    // Sync carrier slider to this mode's memory
    syncCarrierSlider();
    updateModeInfo();

    if (isPlaying) {
      const carrier = carrierMemory[currentMode];
      if (oscL && oscR) {
        oscL.frequency.setTargetAtTime(carrier, audioCtx.currentTime, 0.1);
        oscR.frequency.setTargetAtTime(carrier + MODES[currentMode].beat, audioCtx.currentTime, 0.1);
      }
      document.getElementById('orbStatus').textContent = MODES[currentMode].hz;
      applyModeColor();
      startSleepRampIfNeeded();
    }
  });
});

// Timer presets
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sessionMinutes = parseInt(btn.dataset.min);
    if (!isPlaying) {
      timerRemaining = sessionMinutes * 60;
      updateTimerDisplay();
    }
  });
});

// Mix sliders
document.getElementById('toneVol').addEventListener('input', function() {
  document.getElementById('toneVolVal').textContent = this.value;
  updateToneGain();
});

document.getElementById('noiseVol').addEventListener('input', function() {
  document.getElementById('noiseVolVal').textContent = this.value;
  updateNoiseGain();
});

document.getElementById('carrierFreq').addEventListener('input', function() {
  const val = parseInt(this.value);
  document.getElementById('carrierFreqVal').textContent = val;
  carrierMemory[currentMode] = val;  // save to memory
  if (isPlaying && oscL && oscR) {
    oscL.frequency.setTargetAtTime(val, audioCtx.currentTime, 0.05);
    oscR.frequency.setTargetAtTime(val + MODES[currentMode].beat, audioCtx.currentTime, 0.05);
  }
});

// Noise type
document.querySelectorAll('.noise-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.noise-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    noiseType = btn.dataset.noise;
    if (isPlaying) {
      const ctx = getAudioCtx();
      if (noiseNode) { try { noiseNode.stop(); } catch(e){} }
      noiseNode = ctx.createBufferSource();
      noiseNode.buffer = getNoiseBuffer(ctx);
      noiseNode.loop = true;
      if (noiseGain && fadeGain) {
        noiseNode.connect(noiseGain);
        const nm = ctx.createChannelMerger(2);
        noiseGain.connect(nm, 0, 0);
        noiseGain.connect(nm, 0, 1);
        nm.connect(fadeGain);
      }
      noiseNode.start();
    }
  });
});

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
syncCarrierSlider();
timerRemaining = sessionMinutes * 60;
updateTimerDisplay();
updateModeInfo();
</script>
</body>
</html>
